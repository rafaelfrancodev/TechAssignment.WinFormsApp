services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: dogwalking-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "DogWalk@2024!"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

volumes:
  sqlserver-data:

name: CI - Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore dependencies
        run: dotnet restore TechAssignment.WinFormsApp/TechAssignment.WinFormsApp.slnx

      - name: Build solution
        run: dotnet build TechAssignment.WinFormsApp/TechAssignment.WinFormsApp.slnx --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test Tests.Unit --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: Tests.Unit/TestResults/test-results.trx
